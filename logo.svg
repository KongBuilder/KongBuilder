<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D77E;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8842A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D77E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="#080808" rx="0"/>

  <!-- Outer diamond frame -->
  <polygon points="250,18 482,250 250,482 18,250"
    fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.9"/>

  <!-- Inner diamond frame -->
  <polygon points="250,42 458,250 250,458 42,250"
    fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5"/>

  <!-- Corner ornaments -->
  <circle cx="250" cy="18" r="4" fill="url(#goldGrad)" filter="url(#glow)"/>
  <circle cx="482" cy="250" r="4" fill="url(#goldGrad)" filter="url(#glow)"/>
  <circle cx="250" cy="482" r="4" fill="url(#goldGrad)" filter="url(#glow)"/>
  <circle cx="18" cy="250" r="4" fill="url(#goldGrad)" filter="url(#glow)"/>

  <!-- Mid-edge tick marks -->
  <line x1="250" y1="18" x2="250" y2="30" stroke="#D4AF37" stroke-width="1.5"/>
  <line x1="482" y1="250" x2="470" y2="250" stroke="#D4AF37" stroke-width="1.5"/>
  <line x1="250" y1="482" x2="250" y2="470" stroke="#D4AF37" stroke-width="1.5"/>
  <line x1="18" y1="250" x2="30" y2="250" stroke="#D4AF37" stroke-width="1.5"/>

  <!-- Subtle inner glow circle -->
  <circle cx="250" cy="250" r="155" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.15"/>
  <circle cx="250" cy="250" r="140" fill="#0d0d00" opacity="0.6"/>

  <!-- Main KKB monogram -->
  <!-- K (left) -->
  <text x="108" y="298"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="148"
    font-weight="bold"
    fill="url(#goldGrad)"
    filter="url(#glow)"
    letter-spacing="-2">K</text>

  <!-- K (middle) -->
  <text x="196" y="298"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="148"
    font-weight="bold"
    fill="url(#goldGrad2)"
    filter="url(#glow)"
    letter-spacing="-2">K</text>

  <!-- B (right) -->
  <text x="300" y="298"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="148"
    font-weight="bold"
    fill="url(#goldGrad)"
    filter="url(#glow)"
    letter-spacing="0">B</text>

  <!-- Top label -->
  <text x="250" y="136"
    font-family="'Trebuchet MS', Arial, sans-serif"
    font-size="11"
    font-weight="400"
    fill="#D4AF37"
    text-anchor="middle"
    letter-spacing="5"
    opacity="0.85">KONG</text>

  <!-- Top sub-label -->
  <text x="250" y="155"
    font-family="'Trebuchet MS', Arial, sans-serif"
    font-size="8"
    fill="#C9A84C"
    text-anchor="middle"
    letter-spacing="3"
    opacity="0.7">BUILDER &amp; OPERATOR</text>

  <!-- Bottom label -->
  <text x="250" y="345"
    font-family="'Trebuchet MS', Arial, sans-serif"
    font-size="9"
    fill="#D4AF37"
    text-anchor="middle"
    letter-spacing="3"
    opacity="0.8">SANDPIT-N-QUARRY</text>

  <!-- Bottom sub-label -->
  <text x="250" y="362"
    font-family="'Trebuchet MS', Arial, sans-serif"
    font-size="8"
    fill="#C9A84C"
    text-anchor="middle"
    letter-spacing="2"
    opacity="0.6">KUALA LUMPUR, MALAYSIA</text>

  <!-- Gold horizontal rule top -->
  <line x1="175" y1="168" x2="325" y2="168" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.6"/>

  <!-- Gold horizontal rule bottom -->
  <line x1="175" y1="332" x2="325" y2="332" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.6"/>

  <!-- Diamond center ornament -->
  <polygon points="250,172 256,178 250,184 244,178"
    fill="url(#goldGrad)" opacity="0.7"/>
  <polygon points="250,316 256,322 250,328 244,322"
    fill="url(#goldGrad)" opacity="0.7"/>
</svg>
