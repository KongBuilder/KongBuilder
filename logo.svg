<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7E07A"/>
      <stop offset="45%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#9A7B1C"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F7E07A"/>
      <stop offset="100%" stop-color="#C9A030"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a00"/>
      <stop offset="100%" stop-color="#111100"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textglow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bgGrad)"/>

  <!-- Outer square rotated 45deg (diamond) -->
  <rect x="60" y="60" width="380" height="380" rx="4"
    fill="none" stroke="url(#g1)" stroke-width="1.5"
    transform="rotate(45 250 250)" opacity="0.7"/>

  <!-- Inner square rotated 45deg -->
  <rect x="88" y="88" width="324" height="324" rx="2"
    fill="none" stroke="url(#g1)" stroke-width="0.6"
    transform="rotate(45 250 250)" opacity="0.3"/>

  <!-- Corner dots -->
  <circle cx="250" cy="22" r="3.5" fill="url(#g1)" filter="url(#glow)"/>
  <circle cx="478" cy="250" r="3.5" fill="url(#g1)" filter="url(#glow)"/>
  <circle cx="250" cy="478" r="3.5" fill="url(#g1)" filter="url(#glow)"/>
  <circle cx="22" cy="250" r="3.5" fill="url(#g1)" filter="url(#glow)"/>

  <!-- Thin horizontal lines -->
  <line x1="160" y1="155" x2="340" y2="155" stroke="url(#g1)" stroke-width="0.7" opacity="0.5"/>
  <line x1="160" y1="345" x2="340" y2="345" stroke="url(#g1)" stroke-width="0.7" opacity="0.5"/>

  <!-- Small diamonds on lines -->
  <polygon points="250,148 255,155 250,162 245,155" fill="url(#g1)" opacity="0.8"/>
  <polygon points="250,338 255,345 250,352 245,345" fill="url(#g1)" opacity="0.8"/>

  <!-- KONG main text -->
  <text x="250" y="242"
    font-family="'Palatino Linotype', Palatino, 'Book Antiqua', serif"
    font-size="96"
    font-weight="700"
    fill="url(#g1)"
    text-anchor="middle"
    letter-spacing="12"
    filter="url(#textglow)">KONG</text>

  <!-- Thin separator -->
  <line x1="190" y1="258" x2="310" y2="258" stroke="url(#g2)" stroke-width="0.8" opacity="0.6"/>

  <!-- Sub text -->
  <text x="250" y="278"
    font-family="'Trebuchet MS', Arial, sans-serif"
    font-size="10.5"
    fill="#D4AF37"
    text-anchor="middle"
    letter-spacing="5"
    opacity="0.9">BUILDER &amp; OPERATOR</text>

  <!-- Bottom brand -->
  <text x="250" y="330"
    font-family="'Trebuchet MS', Arial, sans-serif"
    font-size="8"
    fill="#C9A030"
    text-anchor="middle"
    letter-spacing="3.5"
    opacity="0.65">SANDPIT-N-QUARRY  ·  KL</text>

  <!-- Top micro label -->
  <text x="250" y="140"
    font-family="'Trebuchet MS', Arial, sans-serif"
    font-size="7.5"
    fill="#D4AF37"
    text-anchor="middle"
    letter-spacing="4"
    opacity="0.6">ENTERPRISE SYSTEMS</text>
</svg>
